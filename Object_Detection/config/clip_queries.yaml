  홈쇼핑:
    - "home appliance electronics TV"
    - "furniture sofa living room"
    - "bedding blanket pillow bedroom"
    - "kitchen utensils cookware"
    - "travel vacation package resort"

  지방특산물:
    - "person eating dried salted fish meal"
    - "snow crab seafood Korean dish"
    - "abalone shellfish Korean seafood"
    - "Korean beef bulgogi marbled meat"
    - "salted fermented fish side dish"
