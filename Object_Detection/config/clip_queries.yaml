# CLIP Zero-shot 쿼리 목록
# 카테고리별로 분류 — threshold 이상 score시 해당 태그 부착

queries:
  장소:
    - "바닷가"
    - "전통시장"
    - "주방 요리"
    - "야외 캠핑"
    - "산 등산"
    - "농촌 시골"
    - "도심 거리"
    - "어시장 수산물"
    - "음식점 식당"

  한식:
    - "한식 식탁"
    - "해산물 요리"
    - "전골 찌개"
    - "고기구이 바베큐"
    - "생선 요리"
    - "수산물 해산물"
    - "한국 전통 음식"

  홈쇼핑:
    - "가전제품"
    - "가구 소파"
    - "침구 이불"
    - "주방용품"
    - "여행 패키지"

# 탐지 임계값 (이 값 이상만 태그로 저장)
threshold: 0.22

# 사용 모델
model: "clip-ViT-B-32"
model_fallback: "sentence-transformers/clip-ViT-B-32-multilingual-v1"
