# 홈쇼핑 채널별 크롤링 설정
# 각 채널 크롤러에서 참조하는 URL 및 기본 설정

channels:
  SK스토아:
    url: "https://www.skstoa.com/display/schedule/tvSchedule"
    module: skstoa
    enabled: true

  롯데OneTV:
    url: "https://www.lotteimall.com/tvshopping/scheduleAll.lotte"
    module: lotte
    enabled: true

  공영방송:
    url: "https://www.gongyoung.co.kr/tvshopping/selectScheduleSub.do"
    module: gongyoung
    enabled: true

  KT알파쇼핑:
    url: "https://www.kt-alpha.com/display/onair/main.do"
    module: kt_alpha
    enabled: true

  CJ온스타일:
    url: "https://display.cjonstyle.com/p/homeTab/main?hmtabMenuId=T2003"
    module: cj_onstyle
    enabled: true

  LG헬로비전:
    url: "https://www.lghellovision.net/main/mainScheduleListAjax.do"
    module: lg_hellovision
    enabled: true

# 공통 설정
defaults:
  timeout_ms: 30000
  retry_count: 2
  headless: true
