# CLIP Zero-shot 쿼리 목록 — 한국어 버전 (multilingual 모델용)
# 모델: clip-ViT-B-32-multilingual-v1
#
# 설계 원칙:
#   1. 쿼리는 단일~2개 개념 (복합 문장 금지 — CLIP은 soft OR로 처리)
#   2. 관광지는 그룹 간 AND 조건 (context_filter)
#   3. negative는 "추상적 오탐 패턴" 기준 작성
# v4 — GPT/Gemini 점검 반영: 양식/디저트/카페 보강, 한국 관광지 보강, negative 강화

