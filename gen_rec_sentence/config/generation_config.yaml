model:
  name: "gemma2:9b"           # Phase 3 튜닝 후 → "gemma2-rec:latest"로 교체
  temperature: 0.7
  max_retries: 2

quality:
  min_length: 20
  max_length: 120
  forbidden_words:
    - "최고의"
    - "역대급"
    - "대박"
    - "지금 바로"
    - "놓치지 마세요"
    - "줄거리"
    - "내용은"

batch:
  insert_batch_size: 500
  sleep_between_requests: 0.1  # Ollama rate limit

prompt:
  template: |
    당신은 IPTV VOD 서비스의 감성 카피라이터입니다.
    아래 VOD 정보를 바탕으로 홈 배너 포스터 하단에 표시할 감성 문구를 작성하세요.

    규칙:
    - 2문장으로 작성 (각 문장은 개행으로 구분)
    - 총 20~120자
    - 장면이나 분위기를 시각적으로 묘사 (줄거리 요약 금지)
    - 감독명·배우명 네임밸류가 있으면 적극 활용
    - JSON 형식으로만 응답: {{"rec_sentence": "..."}}

    VOD 정보:
    - 제목: {asset_nm}
    - 장르: {genre} / {genre_detail}
    - 감독: {director}
    - 출연: {cast_lead}
    - 등급: {rating}
    - 줄거리: {smry}

data:
  seed_path: "gen_rec_sentence/data/seed_examples.jsonl"
  training_path: "gen_rec_sentence/data/training_data.jsonl"
  eval_path: "gen_rec_sentence/data/eval_results.jsonl"

db:
  ttl_days: 30
