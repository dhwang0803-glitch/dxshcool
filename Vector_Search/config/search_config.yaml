ensemble:
  alpha: 0.4          # CLIP 가중치 (0~1), 나머지는 content_based
  top_n: 20           # 최종 반환 건수

search:
  meta_ivfflat_probes: 20   # vod_meta_embedding 검색 정확도 (lists=400)
  clip_ivfflat_probes: 10   # vod_embedding 검색 정확도 (lists=100)
  sbert_model: "paraphrase-multilingual-MiniLM-L12-v2"
  clip_model: "clip-ViT-B-32"
