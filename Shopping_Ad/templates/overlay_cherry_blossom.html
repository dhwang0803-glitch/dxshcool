<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진해군항제 — 가상광고 오버레이</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #050505;
            color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .title-font { font-family: 'Black Han Sans', sans-serif; }

        .glow-title {
            color: #fff;
            text-shadow:
                0 0 25px rgba(255, 183, 197, 1),
                0 0 55px rgba(255, 120, 150, 0.5),
                0 4px 18px rgba(0, 0, 0, 0.6);
            letter-spacing: -0.05em;
        }

        /* ── 광고 컨테이너: 우측 하단 ── */
        .ad-overlay {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 440px;
            height: 340px;
            z-index: 9999;
        }

        /* ── 등장 애니메이션 ── */
        @keyframes treeBloom {
            0% {
                transform: translateY(55px) scale(0.8);
                opacity: 0;
                filter: blur(6px);
            }
            55% {
                transform: translateY(-6px) scale(1.015);
                opacity: 1;
                filter: blur(0);
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
                filter: blur(0);
            }
        }
        .ad-container {
            position: relative;
            width: 100%;
            height: 100%;
            animation: treeBloom 1.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
        }

        /* ── 꽃잎 흩날리기 ── */
        @keyframes drift {
            0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            8%   { opacity: 0.92; }
            80%  { opacity: 0.75; }
            100% { transform: translate(-320px, 220px) rotate(450deg); opacity: 0; }
        }
        .petal {
            position: absolute;
            border-radius: 100% 0% 100% 0% / 100% 0% 100% 0%;
            animation: drift linear infinite;
            pointer-events: none;
            filter: drop-shadow(0 0 4px rgba(255,183,197,0.35));
        }

        /* ── 반짝이 ── */
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50%      { opacity: 1; transform: scale(1); }
        }
        .sparkle-dot {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: sparkle ease-in-out infinite;
            box-shadow: 0 0 8px 2px rgba(255, 200, 215, 0.75);
            pointer-events: none;
        }

        /* ── 축제 정보 텍스트 ── */
        .fest-info {
            position: absolute;
            bottom: 10%;
            left: 5%;
            z-index: 200;
        }
        .fest-sub {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.45em;
            margin-bottom: 4px;
            color: rgba(255,210,220,0.92);
            text-shadow: 0 1px 8px rgba(0,0,0,0.4);
        }
        .fest-title {
            font-size: 3.2rem;
            margin-bottom: 14px;
            line-height: 1.1;
        }
        .fest-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .date-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,220,230,0.95));
            color: #1a1a1a;
            padding: 6px 18px;
            border-radius: 22px;
            font-size: 11px;
            font-weight: 900;
            box-shadow: 0 4px 18px rgba(0,0,0,0.2);
        }

        /* 닫기 버튼 */
        .close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- 광고 오버레이 -->
    <div class="ad-overlay" id="adOverlay">
        <div class="ad-container" id="adContainer">

            <button class="close-btn" onclick="document.getElementById('adOverlay').style.display='none'">&#10005;</button>

            <!-- 벚꽃나무 SVG -->
            <svg viewBox="0 0 420 340" style="position:absolute;bottom:0;right:0;width:100%;height:100%;overflow:visible;filter:drop-shadow(0 10px 30px rgba(0,0,0,0.25));">
                <defs>
                    <radialGradient id="bloomWhite" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
                        <stop offset="100%" stop-color="#ffb7c5" stop-opacity="0.3" />
                    </radialGradient>
                    <radialGradient id="bloomGlow" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#fff5f7" stop-opacity="0.6" />
                        <stop offset="100%" stop-color="#ffb7c5" stop-opacity="0" />
                    </radialGradient>
                </defs>

                <!-- 나무 기둥 + 가지 -->
                <g stroke="#2a1810" stroke-linecap="round" fill="none" opacity="0.85">
                    <path d="M305 340 Q295 275 298 215 Q300 175 285 130" stroke-width="13"/>
                    <path d="M298 235 Q355 195 375 205" stroke-width="7"/>
                    <path d="M298 235 Q245 185 215 200" stroke-width="6.5"/>
                    <path d="M285 155 Q235 105 205 118" stroke-width="5.5"/>
                    <path d="M285 155 Q335 95 360 108" stroke-width="5.5"/>
                    <path d="M285 130 Q275 80 265 60" stroke-width="4"/>
                    <path d="M375 205 Q395 195 405 200" stroke-width="4"/>
                    <path d="M215 200 Q195 192 185 198" stroke-width="3.5"/>
                </g>

                <!-- 꽃잎 군락 — 3단 레이어 -->
                <g fill="#ff5e78" opacity="0.4">
                    <ellipse cx="285" cy="140" rx="50" ry="38"/>
                    <ellipse cx="340" cy="125" rx="45" ry="32"/>
                    <ellipse cx="225" cy="135" rx="42" ry="30"/>
                    <ellipse cx="365" cy="195" rx="30" ry="22"/>
                    <ellipse cx="200" cy="195" rx="28" ry="20"/>
                </g>
                <g fill="#ffb7c5" opacity="0.75">
                    <ellipse cx="285" cy="110" rx="78" ry="58"/>
                    <ellipse cx="210" cy="125" rx="62" ry="48"/>
                    <ellipse cx="360" cy="120" rx="58" ry="48"/>
                    <ellipse cx="270" cy="60" rx="52" ry="40"/>
                    <ellipse cx="215" cy="190" rx="42" ry="34"/>
                    <ellipse cx="370" cy="195" rx="38" ry="30"/>
                    <ellipse cx="330" cy="70" rx="40" ry="30"/>
                </g>
                <g fill="url(#bloomWhite)" opacity="0.88">
                    <ellipse cx="285" cy="95" rx="82" ry="58"/>
                    <ellipse cx="215" cy="115" rx="62" ry="48"/>
                    <ellipse cx="355" cy="110" rx="68" ry="50"/>
                    <ellipse cx="270" cy="50" rx="48" ry="36"/>
                </g>

                <!-- 글로우 깜빡 -->
                <ellipse cx="280" cy="88" rx="42" ry="26" fill="url(#bloomGlow)" opacity="0.5">
                    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
                </ellipse>
                <ellipse cx="345" cy="105" rx="30" ry="20" fill="url(#bloomGlow)" opacity="0.35">
                    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
                </ellipse>
            </svg>

            <!-- 꽃잎 + 반짝이 (JS로 생성) -->
            <div id="petalStream"></div>
            <div id="sparkleStream"></div>

            <!-- 축제 정보 -->
            <div class="fest-info">
                <p class="fest-sub">CHERRY BLOSSOM FESTIVAL</p>
                <h2 class="title-font glow-title fest-title">진해 군항제</h2>
                <div class="fest-meta">
                    <span class="date-badge">2026.03.27 — 04.05</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 꽃잎 생성
        function createPetals() {
            var c = document.getElementById('petalStream');
            c.innerHTML = '';
            var colors = [
                'rgba(255,255,255,0.92)',
                'rgba(255,220,230,0.88)',
                'rgba(255,183,197,0.82)',
                'rgba(255,200,215,0.9)',
                'rgba(255,240,245,0.85)'
            ];
            for (var i = 0; i < 65; i++) {
                var p = document.createElement('div');
                p.className = 'petal';
                var size = Math.random() * 10 + 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.right = (Math.random() * 400 + 10) + 'px';
                p.style.bottom = (Math.random() * 300 + 20) + 'px';
                p.style.animationDelay = (Math.random() * 7) + 's';
                p.style.animationDuration = (Math.random() * 4 + 4.5) + 's';
                c.appendChild(p);
            }
        }

        // 반짝이 생성
        function createSparkles() {
            var c = document.getElementById('sparkleStream');
            c.innerHTML = '';
            for (var i = 0; i < 18; i++) {
                var s = document.createElement('div');
                s.className = 'sparkle-dot';
                var size = Math.random() * 3 + 2;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.right = (Math.random() * 390 + 10) + 'px';
                s.style.bottom = (Math.random() * 270 + 30) + 'px';
                s.style.animationDelay = (Math.random() * 3) + 's';
                s.style.animationDuration = (Math.random() * 1.8 + 1.2) + 's';
                c.appendChild(s);
            }
        }

        createPetals();
        createSparkles();
        setInterval(createPetals, 9000);
        setInterval(createSparkles, 6000);
    </script>
</body>
</html>
