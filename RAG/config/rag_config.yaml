# RAG Pipeline 설정

pipeline:
  batch_size: 50
  max_workers: 5          # ThreadPoolExecutor (API 검색 병렬)
  request_delay_s: 0.5    # API 요청 간격 (Rate Limit 준수)
  confidence_threshold: 0.6  # 이 미만은 DB UPDATE 안 함

llm:
  host: "http://localhost:11434"
  model: "exaone3.5:7.8b"
  temperature: 0.2
  max_tokens: 100

embedding:
  model: "snunlp/KR-SBERT-V40K-klueNLI-augmented"
  cache_dir: "RAG/config/embeddings_cache"
  chroma_db_dir: "RAG/config/chroma_db"
  retrieval_k: 3

search:
  wikipedia_lang: "ko"     # 1차 한국어, 실패 시 "en"
  imdb_results: 3
  kmrb_results: 1

checkpoint:
  path: "RAG/config/checkpoint.json"
  save_every: 50           # 50건마다 체크포인트 저장

columns:
  high_priority:
    - director
    - cast_lead
    - rating
    - release_date
  medium_priority:
    - cast_guest
    - smry
