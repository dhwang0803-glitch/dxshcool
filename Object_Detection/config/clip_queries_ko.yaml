# 설계 원칙:
#   1. 쿼리는 단일~2개 개념 (복합 문장 금지 — CLIP은 soft OR로 처리)
#   2. 여행지/도시_관광은 그룹 간 AND 조건 (context_filter — 서로 다른 그룹에서 최소 2개 히트)
