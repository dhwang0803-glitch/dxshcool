    - "outdoor camping bonfire"
    - "mountain hiking trail"
    - "rural countryside farm"
    - "city street urban crowd"
    - "fish market seafood display"
    - "restaurant dining table food"

  한식:
    - "Korean food dining table"
    - "seafood Korean cuisine"
    - "Korean stew hot pot bubbling"
    - "Korean BBQ grilled meat"
    - "grilled fish Korean style"
    - "fresh raw seafood shellfish"
