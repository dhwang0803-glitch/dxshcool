  negative:
    - "goldfish aquarium pet tank"
    - "decorative fruit bowl centerpiece"
    - "painting artwork fish illustration"

# 탐지 임계값 (이 값 이상만 태그로 저장)
threshold: 0.25

# 사용 모델
model: "clip-ViT-B-32"
model_fallback: "sentence-transformers/clip-ViT-B-32-multilingual-v1"
