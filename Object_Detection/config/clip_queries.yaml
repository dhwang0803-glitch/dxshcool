# CLIP Zero-shot 쿼리 목록
# 카테고리별로 분류 — threshold 이상 score시 해당 태그 부착
# ad_category는 카테고리 키로 자동 부여됨
#
# [2026-03-15] 한국어 쿼리 + multilingual 모델로 전환
# A/B 실험 결과: std 동등(EN 0.013 ≈ KO 0.012), KO concept 커버리지 우위(23 vs 20)
# threshold 0.26 최적 (EN th=0.25 대비 건수 유사, concept 더 다양)

queries:
  장소:
    - "바닷가 해변 바다"
    - "전통시장 노점 길거리 음식"
    - "주방 요리 실내"
    - "캠핑 야외 모닥불"
    - "등산로 산길 트레킹"
    - "농촌 시골 농장"
    - "도시 거리 사람들"
    - "수산시장 해산물 진열"
    - "식당 밥상 음식"

  한식:
    - "한식 밥상 식탁"
    - "해산물 한국 요리"
    - "전골 찌개 끓는 냄비"
    - "불고기 삼겹살 고기 구이"
    - "생선구이 한국식"
    - "신선한 해산물 조개"
    - "한국 전통 반찬 밥상"

  홈쇼핑:
    - "가전제품 전자기기 TV"
    - "가구 소파 거실"
    - "침구 이불 베개 침실"
    - "주방용품 냄비 프라이팬"
    - "여행 패키지 리조트 휴가"

  지방특산물:
    - "굴비 먹는 식사 장면"
    - "대게 해산물 한국 요리"
    - "전복 조개 해산물"
    - "한우 불고기 마블링 고기"
    - "젓갈 발효 생선 밑반찬"
    - "굴 신선한 조개 해산물"
    - "장어구이 민물장어 한국"

  과일채소:
    - "파인애플 열대 과일"
    - "망고 노란 열대 과일"
    - "딸기 빨간 신선한 과일"
    - "신선한 채소 농산물 시장"
    - "수박 여름 과일"
    - "포도 송이 과일"

  여행지:
    - "유럽 도시 거리 건축물"
    - "동남아시아 열대 해변 리조트"
    - "지중해 해안 푸른 바다"
    - "일본 거리 여행 관광"
    - "제주도 한국 자연 경관"
    - "국내 시골 여행 풍경"

  negative:
    - "금붕어 수조 어항"
    - "장식용 과일 그릇 인테리어"
    - "물고기 그림 삽화 작품"
    - "낚시 낚싯대 강 물가"
    - "바닷속 물고기 해양 다이버"
    - "만화 애니메이션 캐릭터 음식"
    - "재난 화재 사고 긴급 뉴스"

# 탐지 임계값 — A/B 실험으로 최적화된 값
# EN th=0.25(1,385건) vs KO th=0.26(1,925건, concept 23개) 비교 후 채택
threshold: 0.26

# 사용 모델
# 이미지: clip-ViT-B-32 / 텍스트: clip-ViT-B-32-multilingual-v1 (듀얼 모델)
model: "clip-ViT-B-32-multilingual-v1"
model_fallback: "clip-ViT-B-32"
