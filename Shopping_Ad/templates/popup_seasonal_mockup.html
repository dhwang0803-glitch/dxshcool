<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>제철장터 팝업 목업 - 알토란 418회 (379s)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .vod-container {
    position: relative;
    width: 960px;
    height: 540px;
    background: #000;
    overflow: hidden;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  }

  .vod-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* 팝업 - 우측 하단 */
  .popup {
    position: absolute;
    bottom: 24px;
    right: 24px;
    width: 340px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    animation: slideUp 0.5s ease-out;
  }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .popup-badge {
    display: inline-block;
    background: #ff6b35;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 10px;
  }

  .popup-text {
    font-size: 15px;
    color: #222;
    line-height: 1.6;
    margin-bottom: 6px;
  }

  .popup-time {
    font-size: 13px;
    color: #666;
    margin-bottom: 16px;
  }

  .popup-buttons {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 10px 0;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .btn:hover { transform: scale(1.02); }

  .btn-primary {
    background: #ff6b35;
    color: #fff;
  }

  .btn-secondary {
    background: #e8e8e8;
    color: #555;
  }

  /* 제목 표시 */
  .label {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: monospace;
  }

  h2 {
    text-align: center;
    margin: 20px 0 10px;
    font-family: 'Malgun Gothic', sans-serif;
    color: #333;
  }
  p.desc {
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
    font-family: 'Malgun Gothic', sans-serif;
  }
</style>
</head>
<body style="background: #f5f5f5; display: flex; flex-direction: column; align-items: center; padding: 40px;">

<!-- 방송 예정 -->
<h2>방송 예정 팝업</h2>
<p class="desc">food_altoran_418 | 379s | 궁중동치미 클로즈업 | score=1 | smry 보강</p>
<div class="vod-container">
  <img src="../data/frame_altoran_418_379s.jpg" alt="알토란 418회 379초">
  <div class="label">food_altoran_418 @ 379s</div>
  <div class="popup">
    <span class="popup-badge">CH 25 제철장터</span>
    <div class="popup-text">
      3월 25일(수) 제철장터에서<br>
      <strong>아산 포기김치</strong> 판매 예정입니다.
    </div>
    <div class="popup-time">(06:55 ~ 07:55)</div>
    <div class="popup-buttons">
      <button class="btn btn-primary">시청 예약</button>
      <button class="btn btn-secondary">닫기</button>
    </div>
  </div>
</div>

<br><br>

<!-- 방송 중 -->
<h2>방송 중 팝업</h2>
<p class="desc">동일 프레임 - 방송 시간대에 시청 중인 경우</p>
<div class="vod-container">
  <img src="../data/frame_altoran_418_379s.jpg" alt="알토란 418회 379초">
  <div class="label">food_altoran_418 @ 379s</div>
  <div class="popup">
    <span class="popup-badge">CH 25 제철장터</span>
    <div class="popup-text">
      지금 제철장터에서<br>
      <strong>아산 포기김치</strong> 판매 중입니다.
    </div>
    <div class="popup-buttons">
      <button class="btn btn-primary">시청 하기</button>
      <button class="btn btn-secondary">닫기</button>
    </div>
  </div>
</div>

</body>
</html>
